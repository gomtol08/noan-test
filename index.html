<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>의약품 정보 확대 도우미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Noto Sans KR', sans-serif;
        background-color: #f8fafc;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* 고대비 테마 스타일 정의 */
      body.high-contrast {
        background-color: #000000;
        color: #ffffff;
      }
      .high-contrast .bg-white {
        background-color: #111111 !important;
        border: 3px solid #ffffff !important;
      }
      .high-contrast .text-gray-900,
      .high-contrast .text-gray-800,
      .high-contrast .text-gray-700 {
        color: #ffffff !important;
      }
      .high-contrast .bg-blue-600 {
        background-color: #ffff00 !important;
        color: #000000 !important;
      }
      .high-contrast .bg-emerald-600 {
        background-color: #00ffff !important;
        color: #000000 !important;
      }
      .high-contrast .bg-purple-600 {
        background-color: #ff00ff !important;
        color: #ffffff !important;
      }
      .high-contrast .border-gray-100 {
        border-color: #ffffff !important;
      }

      /* 포커스 링 강조 (접근성 표준 준수) */
      *:focus-visible {
        outline: 5px solid #facc15 !important;
        outline-offset: 4px !important;
      }

      /* 로딩 중 깜빡임 효과 */
      .loading-text {
        animation: blinker 1s linear infinite;
        color: #d97706; /* Tailwind amber-600 */
      }
      @keyframes blinker {
        50% {
          opacity: 0;
        }
      }

      /* 바운딩 박스 오버레이 캔버스 스타일 추가 */
      #overlayCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* 클릭 이벤트 통과 */
        z-index: 10;
      }
    </style>
  </head>
  <body class="text-gray-900 transition-colors duration-300">
    <header
      class="w-full bg-gray-200 p-4 flex flex-wrap justify-between items-center shadow-md z-10 gap-4"
      aria-label="접근성 도움 바"
    >
      <div
        class="flex items-center gap-3 bg-white p-2 rounded-xl shadow border-2 border-gray-400"
      >
        <button
          id="soundBtn"
          onclick="toggleSound()"
          class="text-xl sm:text-2xl font-black px-4 py-2 rounded-lg hover:bg-gray-100 focus:outline-none transition-colors"
          aria-label="음성 안내 켜기/끄기"
        >
          🔊 켜짐
        </button>
        <div
          class="flex flex-col justify-center border-l-2 border-gray-300 pl-3 pr-2"
        >
          <label for="volumeSlider" class="text-sm font-bold text-gray-600 mb-1"
            >소리 크기</label
          >
          <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.1"
            value="1"
            oninput="adjustVolume(this.value)"
            class="w-24 sm:w-32 h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600 focus:outline-none focus:ring-2 focus:ring-yellow-400"
            aria-label="음성 안내 소리 크기 조절"
          />
        </div>
      </div>
      <button
        id="contrastBtn"
        onclick="toggleContrast()"
        class="text-xl sm:text-2xl font-black bg-black text-yellow-400 px-5 py-3 rounded-xl shadow border-2 border-yellow-400 focus:outline-none"
        aria-label="색상 반전 고대비 모드 토글"
      >
        고대비 모드 ◑
      </button>
    </header>

    <main
      class="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-5xl mx-auto"
      role="main"
    >
      <div class="text-center mb-8">
        <h1
          class="text-5xl sm:text-6xl font-black mb-4 tracking-tight text-blue-900"
          id="mainTitle"
        >
          약 정보 돋보기
        </h1>
        <p
          class="text-2xl sm:text-3xl font-bold text-gray-700 leading-relaxed"
          id="subTitle"
        >
          원하시는 약품의 형태를<br />아래 버튼에서 선택해 주세요.
        </p>
      </div>

      <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <button
          id="btn-feature-1"
          onclick="selectFeature(1)"
          class="group flex flex-col items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-3xl p-8 shadow-xl transition-transform transform hover:scale-105 border-4 border-transparent focus:border-yellow-400"
          aria-label="박스 형태 약품 유통기한 자동 스캔 시작"
        >
          <img
            src="image_fef8fc.jpg"
            alt="박스형 약품 사진"
            class="w-32 h-32 object-contain bg-white rounded-2xl p-2 mb-4 shadow-md border-2 border-blue-400 group-hover:border-yellow-300 transition-colors"
            aria-hidden="true"
          />
          <span
            class="text-3xl sm:text-4xl font-black text-center leading-tight"
          >
            박스형<br />
            <span
              class="text-lg sm:text-xl opacity-90 font-bold mt-2 block bg-blue-800 px-3 py-1 rounded-full"
              >자동 유통기한 스캔</span
            >
          </span>
        </button>

        <button
          id="btn-feature-2"
          onclick="selectFeature(2)"
          class="group flex flex-col items-center justify-center bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl p-8 shadow-xl transition-transform transform hover:scale-105 border-4 border-transparent focus:border-yellow-400"
          aria-label="병 형태 약품 유통기한 자동 스캔 시작"
        >
          <img
            src="image_fef93f.png"
            alt="병형 약품 사진"
            class="w-32 h-32 object-contain bg-white rounded-2xl p-2 mb-4 shadow-md border-2 border-emerald-400 group-hover:border-yellow-300 transition-colors"
            aria-hidden="true"
          />
          <span
            class="text-3xl sm:text-4xl font-black text-center leading-tight"
          >
            병형<br />
            <span
              class="text-lg sm:text-xl opacity-90 font-bold mt-2 block bg-emerald-800 px-3 py-1 rounded-full"
              >자동 유통기한 스캔</span
            >
          </span>
        </button>

        <button
          id="btn-feature-3"
          onclick="selectFeature(3)"
          class="group flex flex-col items-center justify-center bg-purple-600 hover:bg-purple-700 text-white rounded-3xl p-8 shadow-xl transition-transform transform hover:scale-105 border-4 border-transparent focus:border-yellow-400"
          aria-label="알약 통형 약품 유통기한 자동 스캔 시작"
        >
          <span class="text-7xl mb-4" aria-hidden="true">💊</span>
          <span
            class="text-3xl sm:text-4xl font-black text-center leading-tight"
          >
            약통<br />
            <span
              class="text-lg sm:text-xl opacity-90 font-bold mt-2 block bg-purple-800 px-3 py-1 rounded-full"
              >자동 유통기한 스캔</span
            >
          </span>
        </button>
      </div>

      <section
        class="text-center bg-white p-6 sm:p-8 rounded-3xl shadow-lg w-full max-w-3xl border-2 border-gray-100 mx-auto"
      >
        <h2
          class="text-2xl sm:text-3xl font-black text-gray-800 mb-6 border-b-4 border-blue-500 pb-2 inline-block"
        >
          쉽게 사용하는 방법
        </h2>
        <ol
          class="text-lg sm:text-2xl font-bold text-gray-700 text-left space-y-6 mx-auto max-w-2xl mt-2 w-full"
        >
          <li class="flex items-start gap-3 sm:gap-4">
            <span
              class="bg-blue-600 text-white rounded-full w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center shrink-0 font-black text-xl sm:text-2xl shadow-md mt-0.5"
              >1</span
            >
            <span class="flex-1 break-keep leading-relaxed pt-1.5 sm:pt-2"
              >위의 원하는 <strong>약품의 형태</strong>를 고릅니다.</span
            >
          </li>
          <li class="flex items-start gap-3 sm:gap-4">
            <span
              class="bg-blue-600 text-white rounded-full w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center shrink-0 font-black text-xl sm:text-2xl shadow-md mt-0.5"
              >2</span
            >
            <span class="flex-1 break-keep leading-relaxed pt-1.5 sm:pt-2"
              >카메라 접근을 허용한 뒤, 화면 안으로 <strong>약 정보</strong>가
              들어오도록 비춰주세요.</span
            >
          </li>
          <li class="flex items-start gap-3 sm:gap-4">
            <span
              class="bg-blue-600 text-white rounded-full w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center shrink-0 font-black text-xl sm:text-2xl shadow-md mt-0.5"
              >3</span
            >
            <span class="flex-1 break-keep leading-relaxed pt-1.5 sm:pt-2"
              >잠시 가만히 계시면 자동으로 인식을 완료해 유통기한을
              표시합니다.</span
            >
          </li>
        </ol>
      </section>
    </main>

    <script>
      // ==========================================
      // [API 키 동적 제어 객체] 사용자가 누른 버튼에 따라 값이 교체됩니다.
      // ==========================================
      const API_KEYS = {
        ROBOFLOW: '',
        MODEL_ID: '',
        GOOGLE_VISION: 'AIzaSyCTh9xnrIKWfuglS3BEuaSAAQnjdSQhB0Q',
      };
      // ==========================================

      // 상태 제어 전역 변수
      let videoStream = null;
      let videoTrack = null;
      let ocrWorker = null;
      let isScanning = false;
      let scanTimer = null;
      let isTorchOn = false;
      let lastAudioAlertTime = 0;
      let isSoundOn = true;
      let currentVolume = 1.0;
      let isProcessingFrame = false;

      // 동일 글씨 연속 검증 (집중 인식 로직) 전역 변수
      let lastRecognizedText = '';
      let consecutiveMatchCount = 0;

      // TTS(음성 합성) 지원 함수
      function speak(text) {
        if (!isSoundOn) return;
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ko-KR';
          utterance.rate = 0.9;
          utterance.pitch = 1.0;
          utterance.volume = currentVolume;
          window.speechSynthesis.speak(utterance);
        }
      }

      function toggleSound() {
        isSoundOn = !isSoundOn;
        const btn = document.getElementById('soundBtn');
        const slider = document.getElementById('volumeSlider');
        if (isSoundOn) {
          btn.innerHTML = '🔊 켜짐';
          if (parseFloat(slider.value) === 0) {
            currentVolume = 0.5;
            slider.value = 0.5;
          }
          speak('음성 안내 기능을 켰습니다.');
        } else {
          btn.innerHTML = '🔇 꺼짐';
          if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }
      }

      function adjustVolume(value) {
        currentVolume = parseFloat(value);
        const btn = document.getElementById('soundBtn');
        if (currentVolume === 0) {
          isSoundOn = false;
          btn.innerHTML = '🔇 꺼짐';
          if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        } else {
          isSoundOn = true;
          btn.innerHTML = '🔊 켜짐';
          speak('아');
        }
      }

      function toggleContrast() {
        document.body.classList.toggle('high-contrast');
        const isHighContrast =
          document.body.classList.contains('high-contrast');
        speak(
          isHighContrast
            ? '고대비 모드를 켰습니다.'
            : '일반 화면 모드로 돌아왔습니다.',
        );
      }

      // 🎯 각 버튼에 따라 다른 AI 모델 연결 함수
      function selectFeature(featureNum) {
        if (featureNum === 1) {
          API_KEYS.ROBOFLOW = '7V6pHoQiA8J5kjO1LCuX';
          API_KEYS.MODEL_ID = 'medicine_date2/1';
          speak('박스형 약품 인식기를 준비하고 있습니다. 잠시만 기다려주세요.');
        } else if (featureNum === 2) {
          API_KEYS.ROBOFLOW = 'ixnhP2kovsMPC7CZ73uH';
          API_KEYS.MODEL_ID = 'glass_medicine_date1/1'; // 버전 번호 추가됨
          speak('병형 약품 인식기를 준비하고 있습니다. 잠시만 기다려주세요.');
        } else if (featureNum === 3) {
          API_KEYS.ROBOFLOW = 'm0VswrvOxGyVVYgHJzLT';
          API_KEYS.MODEL_ID = 'tung_medicine_date1/1'; // 버전 번호 추가됨
          speak(
            '알약 통형 약품 인식기를 준비하고 있습니다. 잠시만 기다려주세요.',
          );
        }

        openCameraModal();
      }

      // 스캐너 모달 생성
      async function openCameraModal() {
        if (!document.getElementById('cameraModal')) {
          const modalHtml = `
                <div id="cameraModal" class="fixed inset-0 bg-black z-50 flex flex-col" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
                    <div class="p-4 flex justify-between items-center bg-gray-900 text-white border-b border-gray-800 shrink-0">
                        <h2 id="modalTitle" class="text-2xl font-black">유통기한 스캔 카메라</h2>
                        <div class="flex gap-3">
                            <button id="flashBtn" onclick="toggleFlash()" class="hidden text-xl font-bold bg-yellow-400 text-black px-4 py-2 rounded-xl focus:outline-none">
                                💡 조명 켜기
                            </button>
                            <button onclick="closeCameraModal()" class="text-xl font-bold bg-red-600 px-4 py-2 rounded-xl focus:outline-none">
                                닫기 ✖
                            </button>
                        </div>
                    </div>
                    
                    <div id="cameraContainer" class="relative flex-grow flex flex-col items-center justify-center bg-black overflow-hidden border-8 border-transparent transition-all duration-300">
                        <video id="cameraVideo" class="w-full h-full object-contain" autoplay playsinline></video>
                        <canvas id="overlayCanvas"></canvas>
                        <canvas id="hiddenCanvas" class="hidden"></canvas>
                        <canvas id="cropCanvas" class="hidden"></canvas>
                    </div>

                    <div id="ocrResultArea" class="bg-white p-6 min-h-[180px] max-h-[45vh] overflow-y-auto flex flex-col justify-center items-center border-t-4 border-gray-300 transition-colors duration-300 w-full shrink-0">
                        <img id="magnified-img" class="hidden w-full max-w-sm max-h-[160px] object-contain my-2 border-2 border-gray-300 rounded-lg shadow-md" alt="확대된 유통기한" />
                        
                        <p id="ocrText" class="text-3xl font-black text-gray-900 text-center break-words w-full mt-2">
                            화면 안으로 약 정보를 비춰주세요.<br>
                            <span class="text-xl text-blue-600 mt-2 block">(자동으로 글자를 찾아 읽어드립니다)</span>
                        </p>

                        <button id="retryBtn" onclick="retryScanning()" class="hidden mt-4 w-full max-w-xs bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-xl font-black py-4 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-2" aria-label="다시 인식하기">
                            🔄 다시 인식하기
                        </button>
                    </div>
                </div>
                `;
          document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        document.getElementById('cameraModal').classList.remove('hidden');
        resetUIForScanning();
        speak(
          '자동 스캔 모드를 가동합니다. 화면 전체에 약 정보가 들어오도록 비추고 가만히 계셔 주세요.',
        );
        await startCamera();
      }

      async function startCamera() {
        const videoElement = document.getElementById('cameraVideo');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert(
            '이 기기 및 브라우저 환경에서는 카메라 기능을 실행할 수 없습니다.',
          );
          return;
        }

        try {
          const constraints = {
            video: {
              facingMode: 'environment',
              width: { ideal: 1280 },
              height: { ideal: 720 },
              advanced: [{ focusMode: 'continuous' }],
            },
            audio: false,
          };
          videoStream = await navigator.mediaDevices.getUserMedia(constraints);
          videoElement.srcObject = videoStream;
          videoTrack = videoStream.getVideoTracks()[0];

          if (
            videoTrack.getCapabilities &&
            videoTrack.getCapabilities().torch
          ) {
            document.getElementById('flashBtn').classList.remove('hidden');
          }

          videoElement.onloadedmetadata = () => {
            isScanning = true;
            resizeOverlayCanvas();
            window.addEventListener('resize', resizeOverlayCanvas);
            scanLoop();
          };
        } catch (error) {
          console.error('카메라 에러:', error);
          speak('카메라 연결 실패. 권한을 확인해주세요.');
          closeCameraModal();
        }
      }

      function resizeOverlayCanvas() {
        const video = document.getElementById('cameraVideo');
        const overlay = document.getElementById('overlayCanvas');
        if (video && overlay) {
          overlay.width = video.clientWidth;
          overlay.height = video.clientHeight;
        }
      }

      function closeCameraModal() {
        isScanning = false;
        clearTimeout(scanTimer);
        const modal = document.getElementById('cameraModal');
        if (modal) modal.classList.add('hidden');
        if (videoStream) {
          videoStream.getTracks().forEach((track) => track.stop());
          videoStream = null;
          videoTrack = null;
        }
        window.removeEventListener('resize', resizeOverlayCanvas);
        speak('스캔 모드를 닫았습니다.');
      }

      function toggleFlash() {
        if (!videoTrack) return;
        isTorchOn = !isTorchOn;
        const btn = document.getElementById('flashBtn');
        btn.innerHTML = isTorchOn ? '💡 조명 끄기' : '💡 조명 켜기';
        btn.className = isTorchOn
          ? 'text-xl font-bold bg-yellow-500 text-black px-4 py-2 rounded-xl focus:outline-none ring-4 ring-yellow-300'
          : 'text-xl font-bold bg-yellow-400 text-black px-4 py-2 rounded-xl focus:outline-none';
        videoTrack
          .applyConstraints({ advanced: [{ torch: isTorchOn }] })
          .catch((e) => console.warn(e));
      }

      /* ==========================================================================
         여기서부터 병합된 [인공지능 핵심 통신 엔진] 입니다. (Roboflow + Google Vision)
         ========================================================================== */
      async function scanLoop() {
        if (!isScanning || isProcessingFrame) return;

        const video = document.getElementById('cameraVideo');
        if (video.videoWidth === 0) {
          scanTimer = setTimeout(scanLoop, 500);
          return;
        }

        isProcessingFrame = true; // 통신 중복 방지 락 걸기

        try {
          const capCanvas = document.getElementById('hiddenCanvas');
          const capCtx = capCanvas.getContext('2d');

          capCanvas.width = video.videoWidth;
          capCanvas.height = video.videoHeight;
          capCtx.drawImage(video, 0, 0);

          const base64Image = capCanvas
            .toDataURL('image/jpeg', 0.8)
            .split(',')[1];

          // 1. Roboflow에 사진 전송하여 유통기한 상자 좌표 찾기
          const roboUrl = `https://detect.roboflow.com/${API_KEYS.MODEL_ID}?api_key=${API_KEYS.ROBOFLOW}`;
          const roboResponse = await fetch(roboUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: base64Image,
          });
          const roboResult = await roboResponse.json();

          // 오버레이 캔버스 초기화
          const overlayCanvas = document.getElementById('overlayCanvas');
          const overlayCtx = overlayCanvas.getContext('2d');
          overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

          if (!roboResult.predictions || roboResult.predictions.length === 0) {
            triggerNotFoundUI();
          } else {
            // 상자를 찾았을 때
            const bestBox = roboResult.predictions.reduce((prev, current) =>
              prev.confidence > current.confidence ? prev : current,
            );

            // 비디오 요소의 실제 크기와 비디오 원본 해상도 비율 계산
            const scaleX = overlayCanvas.width / video.videoWidth;
            const scaleY = overlayCanvas.height / video.videoHeight;

            // 바운딩 박스 그리기 (녹색)
            const boxX = (bestBox.x - bestBox.width / 2) * scaleX;
            const boxY = (bestBox.y - bestBox.height / 2) * scaleY;
            const boxW = bestBox.width * scaleX;
            const boxH = bestBox.height * scaleY;

            overlayCtx.strokeStyle = '#00FF00'; // 녹색 테두리
            overlayCtx.lineWidth = 4;
            overlayCtx.strokeRect(boxX, boxY, boxW, boxH);
            overlayCtx.fillStyle = 'rgba(0, 255, 0, 0.2)'; // 반투명 녹색 배경
            overlayCtx.fillRect(boxX, boxY, boxW, boxH);

            // 2. 캔버스로 해당 부위만 잘라내기 (Crop) 및 선명도 필터 적용
            const cropCanvas = document.getElementById('cropCanvas');
            const cropCtx = cropCanvas.getContext('2d');

            const padW = bestBox.width * 0.15;
            const padH = bestBox.height * 0.15;
            const sx = Math.max(0, bestBox.x - bestBox.width / 2 - padW);
            const sy = Math.max(0, bestBox.y - bestBox.height / 2 - padH);
            const sWidth = Math.min(
              capCanvas.width - sx,
              bestBox.width + padW * 2,
            );
            const sHeight = Math.min(
              capCanvas.height - sy,
              bestBox.height + padH * 2,
            );

            cropCanvas.width = sWidth;
            cropCanvas.height = sHeight;
            cropCtx.filter = 'grayscale(100%) contrast(300%)';
            cropCtx.drawImage(
              capCanvas,
              sx,
              sy,
              sWidth,
              sHeight,
              0,
              0,
              sWidth,
              sHeight,
            );

            const croppedBase64 = cropCanvas.toDataURL('image/jpeg', 0.9);

            // 확대된 이미지 갱신
            document.getElementById('magnified-img').src = croppedBase64;
            document.getElementById('magnified-img').classList.remove('hidden');

            const resultText = document.getElementById('ocrText');
            resultText.innerHTML = `<span class="text-3xl font-black loading-text">글자를 판독 중...</span>`;

            // 3. 구글 비전 API로 텍스트 정밀 판독
            const cleanCroppedBase64 = croppedBase64.split(',')[1];
            const googleUrl = `https://vision.googleapis.com/v1/images:annotate?key=${API_KEYS.GOOGLE_VISION}`;
            const googlePayload = {
              requests: [
                {
                  image: { content: cleanCroppedBase64 },
                  features: [{ type: 'TEXT_DETECTION' }],
                },
              ],
            };

            const googleResponse = await fetch(googleUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(googlePayload),
            });
            const googleResult = await googleResponse.json();

            // 4. 결과 도출 및 동일 글씨 2~3회 반복 검증 로직 가동
            if (
              googleResult.responses &&
              googleResult.responses[0].textAnnotations
            ) {
              const textFound =
                googleResult.responses[0].textAnnotations[0].description
                  .trim()
                  .replace(/\s+/g, ' ');

              // 이중 동일 글씨 인식 안정화 판정 검증 루틴
              if (textFound === lastRecognizedText) {
                consecutiveMatchCount++;
              } else {
                lastRecognizedText = textFound;
                consecutiveMatchCount = 1;
              }

              // 같은 글씨가 2번 연속 똑같이 들어왔을 때 -> 최종 집중 인식 완료 판독 처리
              if (consecutiveMatchCount >= 2) {
                isScanning = false; // 일시 루프 정지 (정적 유지를 위함)
                clearTimeout(scanTimer);

                // UI 연출 성공 상태로 격상 (성공적인 녹색 테두리 적용)
                document.getElementById('cameraContainer').className =
                  'relative flex-grow flex flex-col items-center justify-center bg-black overflow-hidden border-8 border-green-500 transition-all duration-300';
                document.getElementById('ocrResultArea').className =
                  'bg-green-50 p-6 min-h-[180px] max-h-[45vh] overflow-y-auto flex flex-col justify-center items-center border-t-4 border-green-500 transition-colors duration-300 w-full shrink-0';

                resultText.innerHTML = `
                    <span class="text-green-700 text-2xl font-black mb-1 block">인식 완료</span>
                    <span class="text-red-600 text-4xl sm:text-5xl font-black tracking-wider break-all">${textFound}</span>
                `;

                // 오버레이 캔버스에 빨간 상자가 유지되도록 함
                document.getElementById('retryBtn').classList.remove('hidden');

                // 음성 출력 (집중 정지 시점에 단 1회 선명하게 음성 전달)
                speak(`인식된 유통기한 내용: ${textFound}`);
              } else {
                // 아직 1회차 인식이거나 글자가 일시적으로 떨리고 있는 경우의 임시 판독 알림
                resultText.innerHTML = `
                    <span class="text-amber-600 text-xl font-bold mb-1 block">사용기간이 인식되었습니다. 카메라를 고정해주세요.</span>
                    <span class="text-red-600 text-3xl sm:text-4xl font-black tracking-wider break-all">${textFound}</span>
                `;
                speak(textFound);
              }
            } else {
              resultText.innerHTML = `<span class="text-red-600 text-2xl font-black">글자를 감지하지 못했습니다.</span>`;
              lastRecognizedText = '';
              consecutiveMatchCount = 0;
            }
          }
        } catch (error) {
          console.error('통신 에러:', error);
        } finally {
          isProcessingFrame = false; // 락 해제

          // 집중 인식이 완료되어 isScanning이 false로 닫힌 경우를 제외하고 지속 스캔
          if (isScanning) {
            scanTimer = setTimeout(scanLoop, 500); // 0.5초 간격으로 스캔
          }
        }
      }

      function triggerNotFoundUI() {
        // Roboflow 탐지 실패 시 정밀 집중 인식 카운터 리셋
        lastRecognizedText = '';
        consecutiveMatchCount = 0;

        const currentTime = Date.now();
        if (currentTime - lastAudioAlertTime > 5000) {
          const resultText = document.getElementById('ocrText');
          resultText.innerHTML = `
                  <span class="text-red-600 text-2xl font-black leading-snug">
                      사용기간이 인식되지 않았습니다. 다른 부분을 비춰주세요.
                  </span>
              `;
          lastAudioAlertTime = currentTime;
        }
      }

      // 잘못 인식했을 때 새로 락을 풀고 다시 인식하게 해주는 버튼 컨트롤러
      function retryScanning() {
        lastRecognizedText = '';
        consecutiveMatchCount = 0;
        isScanning = true;
        isProcessingFrame = false;

        resetUIForScanning();
        speak('다시 인식을 시작합니다. 약 정보를 화면에 비춰주세요.');

        // 스캔 분석 시작
        scanLoop();
      }

      function resetUIForScanning() {
        document.getElementById('ocrResultArea').className =
          'bg-white p-6 min-h-[180px] max-h-[45vh] overflow-y-auto flex flex-col justify-center items-center border-t-4 border-gray-300 transition-colors duration-300 w-full shrink-0';
        document.getElementById('cameraContainer').className =
          'relative flex-grow flex items-center justify-center bg-black overflow-hidden border-8 border-transparent transition-all duration-300';
        document.getElementById('ocrText').innerHTML =
          '화면 안으로 약 정보를 비춰주세요.<br><span class="text-xl text-blue-600 mt-2 block">(자동으로 글자를 찾아 읽어드립니다)</span>';
        document.getElementById('magnified-img').classList.add('hidden');
        document.getElementById('retryBtn').classList.add('hidden');

        // 오버레이 캔버스 초기화
        const overlayCanvas = document.getElementById('overlayCanvas');
        if (overlayCanvas) {
          const overlayCtx = overlayCanvas.getContext('2d');
          overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }
      }

      // OCR 엔진 구축 (더미)
      async function initTesseract() {
        if (!ocrWorker) {
          try {
            console.log('OCR 엔진을 구축하는 중...');
            ocrWorker = await Tesseract.createWorker('kor+eng');
            console.log('Tesseract 엔진 활성화 성공');
          } catch (e) {
            console.error('OCR 모듈 초기설정 에러:', e);
          }
        }
      }
    </script>
  </body>
</html>
