<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의약품 정보 확대 도우미</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc; /* 부드러운 배경색 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* 고대비 테마 (필요 시 토글 가능하도록 준비) */
        body.high-contrast {
            background-color: #000;
            color: #fff;
        }
        .high-contrast .bg-white {
            background-color: #111 !important;
            border: 2px solid #fff;
        }
        .high-contrast .text-gray-800 { color: #fff !important; }
        .high-contrast .text-gray-600 { color: #ccc !important; }
        .high-contrast .bg-blue-600, .high-contrast .bg-emerald-600, .high-contrast .bg-purple-600 { background-color: #ffff00 !important; color: #000 !important; }
        .high-contrast .hover\:bg-blue-700:hover, .high-contrast .hover\:bg-emerald-700:hover, .high-contrast .hover\:bg-purple-700:hover { background-color: #cccc00 !important; }

        /* 포커스 링 강조 (접근성) */
        *:focus-visible {
            outline: 4px solid #facc15 !important;
            outline-offset: 4px !important;
        }

        /* 펄스 애니메이션 (카메라 버튼 강조용) */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(37, 99, 235, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        .btn-pulse {
            animation: pulse-ring 2s infinite;
        }
    </style>
</head>
<body class="text-gray-900 transition-colors duration-300">

    <!-- 상단 접근성 컨트롤 바 -->
    <div class="w-full bg-gray-200 p-4 flex justify-between items-center shadow-sm" aria-label="접근성 메뉴">
        <button id="ttsBtn" onclick="speak('접근성 메뉴입니다. 화면 읽기 기능을 켭니다.')" class="text-xl font-bold bg-white px-4 py-2 rounded-lg shadow border-2 border-gray-300 focus:outline-none focus:ring-4 focus:ring-yellow-400" aria-label="음성 안내 켜기">
            🔊 음성 안내
        </button>
        <button id="contrastBtn" onclick="toggleContrast()" class="text-xl font-bold bg-black text-white px-4 py-2 rounded-lg shadow border-2 border-white focus:outline-none focus:ring-4 focus:ring-yellow-400" aria-label="고대비 모드 전환">
            고대비 모드 ◑
        </button>
    </div>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-5xl mx-auto" role="main">
        <!-- 로고 및 타이틀 -->
        <div class="text-center mb-10">
            <h1 class="text-5xl sm:text-6xl font-black mb-4 tracking-tight text-blue-900" id="mainTitle">
                약 정보 돋보기
            </h1>
            <p class="text-2xl sm:text-3xl font-bold text-gray-700 leading-relaxed" id="subTitle">
                원하시는 기능을<br>선택해 주세요.
            </p>
        </div>

        <!-- 3가지 기능 버튼 영역 -->
        <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <!-- 기능 1 -->
            <button id="btn-feature-1" onclick="selectFeature(1)" class="group relative flex flex-col items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-3xl p-8 shadow-xl transition-transform transform hover:scale-105 border-4 border-transparent focus:border-yellow-400" aria-label="첫 번째 기능 선택">
                <span class="text-6xl mb-4" aria-hidden="true">📅</span>
                <span class="text-3xl md:text-4xl font-black break-keep text-center">박스형<br><span class="text-xl md:text-2xl opacity-90 font-bold mt-2 block"></span></span>
            </button>
            
            <!-- 기능 2 -->
            <button id="btn-feature-2" onclick="selectFeature(2)" class="group relative flex flex-col items-center justify-center bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl p-8 shadow-xl transition-transform transform hover:scale-105 border-4 border-transparent focus:border-yellow-400" aria-label="두 번째 기능 선택">
                <span class="text-6xl mb-4" aria-hidden="true">💊</span>
                <span class="text-3xl md:text-4xl font-black break-keep text-center">병형<br><span class="text-xl md:text-2xl opacity-90 font-bold mt-2 block"></span></span>
            </button>

            <!-- 기능 3 -->
            <button id="btn-feature-3" onclick="selectFeature(3)" class="group relative flex flex-col items-center justify-center bg-purple-600 hover:bg-purple-700 text-white rounded-3xl p-8 shadow-xl transition-transform transform hover:scale-105 border-4 border-transparent focus:border-yellow-400" aria-label="세 번째 기능 선택">
                <span class="text-6xl mb-4" aria-hidden="true">🔍</span>
                <span class="text-3xl md:text-4xl font-black break-keep text-center">알약 통형<br><span class="text-xl md:text-2xl opacity-90 font-bold mt-2 block"></span></span>
            </button>
        </div>

        <!-- 추가 안내 영역 -->
        <div class="text-center bg-white p-6 rounded-2xl shadow-md w-full max-w-3xl border-2 border-gray-100 mx-auto">
            <h2 class="text-3xl font-bold text-gray-800 mb-4 border-b-4 border-blue-500 pb-2 inline-block">사용 방법</h2>
            <ol class="text-2xl font-bold text-gray-700 text-left space-y-4 mx-auto max-w-lg mt-4">
                <li class="flex items-start">
                    <span class="bg-blue-600 text-white rounded-full w-10 h-10 flex items-center justify-center mr-4 shrink-0">1</span>
                    <span>위의 3가지 버튼 중 <strong>원하는 기능</strong>을 누릅니다.</span>
                </li>
                <li class="flex items-start">
                    <span class="bg-blue-600 text-white rounded-full w-10 h-10 flex items-center justify-center mr-4 shrink-0">2</span>
                    <span>카메라가 켜지면 약병이나 알약을 화면에 비춥니다.</span>
                </li>
                <li class="flex items-start">
                    <span class="bg-blue-600 text-white rounded-full w-10 h-10 flex items-center justify-center mr-4 shrink-0">3</span>
                    <span>큰 글씨와 음성으로 정보를 확인합니다.</span>
                </li>
            </ol>
        </div>
    </main>

    <!-- 인터랙션 스크립트 -->
    <script>
        let ttsEnabled = false;

        // 음성 읽어주기 함수 (Web Speech API)
        function speak(text) {
            if ('speechSynthesis' in window) {
                // 현재 진행 중인 음성 취소
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.9; // 약간 천천히
                utterance.pitch = 1.0;
                
                window.speechSynthesis.speak(utterance);
            } else {
                console.log("이 브라우저는 음성 합성을 지원하지 않습니다.");
            }
        }

        // 고대비 모드 토글
        function toggleContrast() {
            document.body.classList.toggle('high-contrast');
            
            const isHighContrast = document.body.classList.contains('high-contrast');
            const msg = isHighContrast ? "고대비 모드를 켰습니다." : "일반 모드로 전환했습니다.";
            speak(msg);
        }

        // 기능 선택 버튼 클릭 (나중에 각각의 페이지로 연결하기 위해 번호로 구분)
        function selectFeature(featureNum) {
            const featureNames = {
                1: "첫 번째 기능 (예: 유통기한 확인)",
                2: "두 번째 기능 (예: 복용법 안내)",
                3: "세 번째 기능 (예: 알약 검색)"
            };
            
            // 음성 안내
            speak(`${featureNames[featureNum]} 기능을 선택하셨습니다.`);
            
            // 시각적 피드백 (버튼 텍스트 변경)
            const btn = document.getElementById(`btn-feature-${featureNum}`);
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<span class="text-3xl sm:text-4xl font-black py-10 text-center">준비 중...</span>`;
            
            // 기능 1 선택 시 카메라 및 OCR 모달 열기
            if (featureNum === 1) {
                setTimeout(() => {
                    btn.innerHTML = originalHtml; // 버튼 복구
                    openCameraModal(); // 카메라 모달 띄우기
                }, 1000);
            } else {
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                }, 2000);
            }
        }

        // 마우스 오버 시 주요 텍스트 음성 안내 (TTS 활성화 시)
        document.addEventListener('DOMContentLoaded', () => {
            const elementsToSpeak = [
                document.getElementById('mainTitle'),
                document.getElementById('subTitle'),
                document.getElementById('btn-feature-1'),
                document.getElementById('btn-feature-2'),
                document.getElementById('btn-feature-3')
            ];

            elementsToSpeak.forEach(el => {
                if(el) {
                    el.addEventListener('mouseenter', () => {
                        // 접근성을 위해 나중에 호버 시 자동 음성안내를 추가할 수 있는 자리입니다.
                    });
                }
            });
        });

        /* =========================================
           카메라 및 텍스트 인식 (OCR) 기능 추가
           ========================================= */
        
        let videoStream = null;

        // 카메라 모달 열기
        async function openCameraModal() {
            // 모달 UI 동적 생성
            if(!document.getElementById('cameraModal')) {
                const modalHtml = `
                <div id="cameraModal" class="fixed inset-0 bg-black z-50 flex flex-col" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
                    <!-- 상단 컨트롤 -->
                    <div class="p-4 flex justify-between items-center bg-gray-900 text-white">
                        <h2 id="modalTitle" class="text-2xl font-bold">글자 읽기 모드</h2>
                        <button onclick="closeCameraModal()" class="text-xl font-bold bg-red-600 px-4 py-2 rounded-lg focus:outline-none focus:ring-4 focus:ring-yellow-400">
                            닫기 ✖
                        </button>
                    </div>
                    
                    <!-- 카메라 화면 (뷰파인더) -->
                    <div class="relative flex-grow flex items-center justify-center bg-black overflow-hidden">
                        <video id="cameraVideo" class="w-full h-full object-cover" autoplay playsinline></video>
                        <canvas id="cameraCanvas" class="hidden"></canvas> <!-- 캡처용 캔버스 (숨김) -->
                        
                        <!-- 조준선 (가이드) -->
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div class="w-3/4 h-1/3 border-4 border-yellow-400 rounded-xl flex items-center justify-center bg-black bg-opacity-20">
                                <span class="text-yellow-400 text-2xl font-bold bg-black bg-opacity-50 px-2 rounded">이 안에 글자를 맞추세요</span>
                            </div>
                        </div>
                    </div>

                    <!-- 결과 출력 영역 -->
                    <div id="ocrResultArea" class="bg-white p-6 min-h-[150px] flex flex-col justify-center items-center">
                        <p id="ocrText" class="text-3xl font-black text-gray-900 text-center break-words w-full">
                            카메라를 비추고 캡처 버튼을 누르세요.
                        </p>
                    </div>

                    <!-- 하단 캡처 버튼 -->
                    <div class="p-6 bg-gray-200 flex justify-center">
                        <button id="captureBtn" onclick="captureAndRecognize()" class="w-full md:w-1/2 bg-blue-600 hover:bg-blue-700 text-white text-3xl font-black py-4 rounded-2xl shadow-lg border-4 border-transparent focus:border-yellow-400 flex items-center justify-center btn-pulse">
                            📸 텍스트 읽기
                        </button>
                    </div>
                </div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
            }

            document.getElementById('cameraModal').classList.remove('hidden');
            speak("카메라 모드를 열었습니다. 화면 가운데 글자를 맞추고 텍스트 읽기 버튼을 누르세요.");
            
            // 카메라 시작
            await startCamera();
        }

        // 카메라 모달 닫기
        function closeCameraModal() {
            document.getElementById('cameraModal').classList.add('hidden');
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            speak("카메라 모드를 닫았습니다.");
        }

        // 후면 카메라 활성화
        async function startCamera() {
            const videoElement = document.getElementById('cameraVideo');
            
            // 지원 여부 확인
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("이 브라우저에서는 카메라 기능을 지원하지 않습니다.");
                return;
            }

            try {
                // 후면 카메라(environment) 우선 요청
                const constraints = {
                    video: { facingMode: 'environment' },
                    audio: false
                };
                
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = videoStream;
            } catch (error) {
                console.error("카메라 접근 오류:", error);
                alert("카메라에 접근할 수 없습니다. 권한을 확인해주세요.");
                speak("카메라 접근에 실패했습니다.");
            }
        }

        // 화면 캡처 및 Tesseract.js로 OCR 수행
        function captureAndRecognize() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            const resultTextEl = document.getElementById('ocrText');
            const captureBtn = document.getElementById('captureBtn');

            // 1. 비디오 화면을 캔버스에 그리기 (캡처)
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 캔버스 데이터를 Base64 이미지로 변환
            const imageDataUrl = canvas.toDataURL('image/jpeg');

            // UI 상태 변경 (로딩 중)
            resultTextEl.innerHTML = '<span class="text-blue-600">글자를 분석 중입니다... 잠시만 기다려주세요.</span>';
            speak("글자를 분석 중입니다. 잠시만 기다려주세요.");
            captureBtn.disabled = true;
            captureBtn.classList.add('opacity-50', 'cursor-not-allowed');
            captureBtn.innerText = "⏳ 분석 중...";

            // 2. Tesseract.js (CDN 사용) 동적 로드 후 OCR 실행
            if (typeof Tesseract === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';
                script.onload = () => performOCR(imageDataUrl);
                document.head.appendChild(script);
            } else {
                performOCR(imageDataUrl);
            }
        }

        // 실제 OCR 작업 수행 함수
        function performOCR(imageUrl) {
            const resultTextEl = document.getElementById('ocrText');
            const captureBtn = document.getElementById('captureBtn');

            // 한국어(kor)와 영어(eng) 인식
            Tesseract.recognize(
                imageUrl,
                'kor+eng',
                { logger: m => console.log(m) } // 진행 상황 콘솔 출력
            ).then(({ data: { text } }) => {
                let recognizedText = text.trim();
                
                // 인식 결과가 없을 경우 처리
                if (!recognizedText || recognizedText.length < 2) {
                    recognizedText = "인식된 글자가 없습니다. 다시 시도해주세요.";
                    resultTextEl.innerHTML = `<span class="text-red-600">${recognizedText}</span>`;
                } else {
                    resultTextEl.innerText = recognizedText;
                }
                
                // 결과 음성 출력
                speak(recognizedText);

            }).catch(err => {
                console.error("OCR 오류:", err);
                resultTextEl.innerHTML = '<span class="text-red-600">분석 중 오류가 발생했습니다.</span>';
                speak("분석 중 오류가 발생했습니다.");
            }).finally(() => {
                // 버튼 상태 복구
                captureBtn.disabled = false;
                captureBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                captureBtn.innerHTML = "📸 텍스트 다시 읽기";
            });
        }
    </script>
</body>
</html>
